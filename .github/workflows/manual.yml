name: Manual Multi-Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 21  # [수정] 최신 Firebase 호환을 위해 21 권장
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'    # [추가] 빌드 속도와 안정성을 위해 캐시 사용

      # 윈도우용 빌드
      - name: Build Windows
        run: ./gradlew desktop:dist --no-daemon

      # 안드로이드용 빌드 (메모리 컷트라인 지정)
      - name: Build Android
        # [중요] -Xmx3g로 서버가 죽지 않게 메모리 상한선을 확실히 긋습니다.
        run: ./gradlew android:assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=512m"

      # 윈도우 파일 업로드
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: Unciv-Windows-Custom
          path: desktop/build/libs/*.jar

      # 안드로이드 파일 업로드
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: Unciv-Android-Custom
          path: android/build/outputs/apk/release/*.apk
